name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Server dependencies
        working-directory: server
        run: npm ci

      - name: Server lint
        working-directory: server
        run: npm run lint

      - name: Client dependencies
        run: npm ci

      - name: Client typecheck
        run: npx tsc --noEmit

      - name: Admin dependencies
        working-directory: admin
        run: npm ci

      - name: Admin lint
        working-directory: admin
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: palsafar_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Run tests
        working-directory: server
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/palsafar_test
          NODE_ENV: test
